<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWINZ OS IRON - 2030 Mining Command</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');
:root {
  --bg: #020a14;
  --accent: #00d9ff;
  --warn: #ffaa00;
  --danger: #ff3b30;
  --glass: rgba(0,217,255,0.06);
  --text: #d0f0ff;
}
* {margin:0; padding:0; box-sizing:border-box; font-family: 'Rajdhani', sans-serif;}
body {
  background: var(--bg);
  background-image: radial-gradient(circle at 50% 0%, rgba(0,217,255,0.08) 0%, transparent 60%);
  color: var(--text);
  min-height: 100vh;
}
.header {
  display:flex; justify-content:space-between; align-items:center;
  padding: 20px 40px; border-bottom: 1px solid var(--accent);
  background: linear-gradient(180deg, rgba(0,217,255,0.05), transparent);
}
.header h1 {
  font-size: 2em; font-weight: 700; letter-spacing: 2px;
  color: var(--accent); text-shadow: 0 0 10px var(--accent);
}
.status {
  display:flex; gap:20px; font-size:0.9em;
}
.status.dot {width:10px; height:10px; background:var(--accent); border-radius:50%; box-shadow:0 0 10px var(--accent); animation: blink 1.5s infinite;}
@keyframes blink {50%{opacity:0.3}}
.jarvis-bar {
  margin: 20px 40px; padding: 15px; background: var(--glass);
  border: 1px solid var(--accent); border-radius: 12px;
  display:flex; gap:10px;
}
.jarvis-bar input {
  flex:1; background:transparent; border:none; color:var(--text); font-size:1em; outline:none;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  padding: 30px 40px;
  max-width: 1600px; margin: 0 auto;
}
.card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(0,217,255,0.3);
  border-radius: 16px;
  padding: 25px;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}
.card:hover {
  border-color: var(--accent);
  background: rgba(0,217,255,0.1);
  transform: translateY(-4px);
  box-shadow: 0 0 25px rgba(0,217,255,0.2);
}
.card.icon {font-size: 2.5em; margin-bottom: 12px;}
.card h3 {font-size: 1.2em; font-weight: 700; margin-bottom: 5px;}
.card.sub {font-size:0.85em; opacity:0.7; margin-bottom:10px;}
.card.metric {display:flex; justify-content:space-between; font-size:0.9em; margin-top:8px;}
.modal {
  display: none; position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
  justify-content: center; align-items: center; z-index: 1000;
}
.modal-content {
  background: #010a14;
  border: 1px solid var(--accent);
  border-radius: 18px; padding: 35px; width: 95%; max-width: 750px;
  box-shadow: 0 0 40px rgba(0,217,255,0.2);
}
.kpi {
  display:grid; grid-template-columns: repeat(3,1fr); gap:15px; margin:20px 0;
}
.kpi-box {
  background: rgba(0,217,255,0.05); padding:15px; border-radius:10px; text-align:center;
  border-left: 3px solid var(--accent);
}
.kpi-box h4 {font-size:1.6em; color:var(--accent);}
.btn {
  background: linear-gradient(90deg, var(--accent), #0088ff);
  border: none; color: #000; padding: 14px 24px; border-radius: 10px;
  font-weight: 700; cursor: pointer; width: 100%; margin-top: 15px;
  font-size: 1em; letter-spacing:1px;
}
.btn:hover {box-shadow: 0 0 20px var(--accent);}
.btn.warn {background: var(--warn);}
.btn.danger {background: var(--danger); color:#fff;}
</style>
</head>
<body>

<div class="header">
  <h1>TWINZ OS // IRON</h1>
  <div class="status">
    <span><div class="dot"></div> ONLINE</span>
    <span>MINE: TWINZ IRON</span>
    <span>2030.04.12</span>
  </div>
</div>

<div class="jarvis-bar">
  <span>🤖</span>
  <input id="jarvisInput" placeholder="JARVIS: 'Show pending SLP items' or 'Who needs induction'">
  <button class="btn" style="width:auto;" onclick="jarvisCommand()">RUN</button>
</div>

<div class="grid" id="appGrid"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="modalTitle"></h2>
    <div id="modalBody"></div>
    <button class="btn" onclick="closeModal()">CLOSE</button>
  </div>
</div>

<script>
// 2030 IRON MAN STYLE MODULES - PRACTICAL + SMART
const modules = [
  {icon:"👷", name:"LABOR COMMAND", sub:"AI Recruitment + Compliance", metrics:["512 Profiles","47 Hired","98% BEE"], data:["Name","ID","Skill","Phone","Status: Available/Hired"]},
  {icon:"🚛", name:"FLEET OPS", sub:"Live Tracking + Dispatch", metrics:["32 Active","18 Loads","R2.4K Avg"], data:["Company","Truck Reg","Rate/KM","Driver","GPS Link"]},
  {icon:"🏪", name:"SUPPLIER HUB", sub:"BEE Vendors + Tenders", metrics:["24 Vendors","R1.2M Spend","86 POs"], data:["Business","Service","BEE Level","Contact","Invoice Upload"]},
  {icon:"📊", name:"SLP DASHBOARD", sub:"Auto DMR Reporting", metrics:["R8.4M YTD","320 Jobs","Audit: PASS"], data:["Report Type","Quarter","Attachment","Notes"]},
  {icon:"🦺", name:"SAFETY CONTROL", sub:"Induction + PPE Tracking", metrics:["1040 Inducted","98% Valid","0 LTI"], data:["Employee","Induction Date","PPE Expiry","Medical"]},
  {icon:"💰", name:"TREASURY", sub:"Payments + Transparency", metrics:["R4.8M Paid","67 Suppliers","0 Disputes"], data:["Payee","Amount","Service","Proof Upload"]},
  {icon:"📢", name:"GRIEVANCE CENTER", sub:"48hr Resolution SLA", metrics:["3 Open","142 Closed","96% Sat"], data:["Ward","Issue","Priority","Voice Note"]},
  {icon:"🎓", name:"SKILLS ACADEMY", sub:"SETA + Placement", metrics:["240 Students","89 Placed","12 Courses"], data:["Course","Student Name","ID","Phone"]},
  {icon:"🌱", name:"BUSINESS INCUBATOR", sub:"Grants + Market Access", metrics:["38 Businesses","R2.1M Grants","54 Contracts"], data:["Business","Funding Needed","Sector","Proposal"]},
  {icon:"🏥", name:"HEALTH PORTAL", sub:"Clinic + Campaigns", metrics:["1200 Patients","8 Campaigns","A Rating"], data:["Service","Name","Phone","Date"]},
  {icon:"⚽", name:"YOUTH & CULTURE", sub:"Sponsorships + Bursaries", metrics:["16 Teams","R500K Bursaries","4 Events"], data:["Event","Team/Name","Budget","Contact"]},
  {icon:"🏦", name:"TRUST FUND", sub:"Closure Planning", metrics:["R12M Balance","9 Projects","3400 Votes"], data:["Project","Cost","Ward","Vote"]},
  {icon:"🗺️", name:"HERITAGE MAP", sub:"Land + Consultation Log", metrics:["22 Sites","18 Meetings","100% Agreed"], data:["Location","Issue","GPS","Notes"]},
  {icon:"🌳", name:"ESG MONITOR", sub:"Environment Tracking", metrics:["8400 Trees","Water: OK","ESG: AA"], data:["Metric","Value","Photo","Location"]},
  {icon:"💳", name:"COMMUNITY WALLET", sub:"Stokvel + Payments", metrics:["640 Members","R3.2M Saved","112 Loans"], data:["Action","Amount","Member ID","Ref"]},
  {icon:"🤖", name:"PREDICTIVE AI", sub:"Risk + Insights", metrics:["5 Alerts","94% Accurate","R1.8M Saved"], data:["Ask AI","Department","Urgency"]},
  {icon:"📦", name:"DEPLOYMENT KIT", sub:"Clone to Other Mines", metrics:["1 Template","0 Deployed","R250K Value"], data:["Mine Name","Province","Contact","Email"]}
];

const appGrid = document.getElementById('appGrid');
modules.forEach((m, i) => {
  appGrid.innerHTML += `
    <div class="card" onclick="openModule(${i})">
      <div class="icon">${m.icon}</div>
      <h3>${m.name}</h3>
      <div class="sub">${m.sub}</div>
      ${m.metrics.map(met => `<div class="metric"><span>${met.split(' ')[1]||met}</span><b>${met.split(' ')[0]}</b></div>`).join('')}
    </div>
  `;
});

function openModule(i) {
  const m = modules[i];
  let kpiHTML = '<div class="kpi">';
  m.metrics.forEach(k => kpiHTML += `<div class="kpi-box"><h4>${k.split(' ')[0]}</h4><p>${k.split(' ').slice(1).join(' ')}</p></div>`);
  kpiHTML += '</div>';

  let formHTML = '';
  m.data.forEach(f => formHTML += `<input type="text" placeholder="${f}">`);

  document.getElementById('modalTitle').innerText = `${m.icon} ${m.name}`;
  document.getElementById('modalBody').innerHTML = `
    <p style="opacity:0.8;">${m.sub}</p>
    ${kpiHTML}
    <h4 style="margin:15px 0 5px;">NEW ENTRY</h4>
    ${formHTML}
    <button class="btn" onclick="saveData('${m.name}')">SUBMIT TO DATABASE</button>
    <button class="btn warn" onclick="alert('Exporting to Excel...')">EXPORT REPORT</button>
  `;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {document.getElementById('modal').style.display = 'none';}

function saveData(module) {
  let data = JSON.parse(localStorage.getItem('twinzIron')) || [];
  data.push({module, time: new Date().toISOString()});
  localStorage.setItem('twinzIron', JSON.stringify(data));
  alert(`✓ ENTRY SAVED\nModule: ${module}\nTotal: ${data.length}\nSynced to Cloud`);
  closeModal();
}

function jarvisCommand() {
  const q = document.getElementById('jarvisInput').value;
  if(q) alert(`JARVIS: Processing "${q}"\n\nResult: 3 items found. Opening relevant module...`);
}
</script>
</body>
</html>
