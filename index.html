<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWINZ OS DEEP CORE - Surface + Underground Command</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
:root {
  --bg: #01060f;
  --accent: #00d9ff;
  --warm: #ffb700;
  --danger: #ff3b30;
  --glass: rgba(0,217,255,0.05);
  --text: #e6f9ff;
}
* {margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif;}
body {background: var(--bg); color: var(--text); min-height: 100vh;}
.pulse-bg {position: fixed; width:200%; height:200%; top:-50%; left:-50%; background: radial-gradient(circle, rgba(0,217,255,0.03) 0%, transparent 70%); animation: pulse 8s ease-in-out infinite; z-index:-1;}
@keyframes pulse {0%,100%{transform:scale(1)} 50%{transform:scale(1.1)}}
.header {display:flex; justify-content:space-between; align-items:center; padding: 25px 40px; border-bottom: 1px solid rgba(0,217,255,0.2);}
.header h1 {font-size: 2.2em; font-weight: 800; background: linear-gradient(90deg, var(--accent), var(--warm)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
.badge-underground {background:var(--danger); color:#fff; padding:3px 8px; border-radius:6px; font-size:0.7em;}
.ceo-bar {display:flex; gap:20px; justify-content:center; margin:20px 40px; background: var(--glass); padding:20px; border-radius:16px; flex-wrap:wrap;}
.ceo-num {text-align:center; min-width:110px;}.ceo-num h2 {font-size:2em; color:var(--accent);}
.grid {display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; padding: 0 40px 100px; max-width: 1600px; margin: 0 auto;}
.card {background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(0,217,255,0.2); border-radius: 20px; padding: 25px; cursor: pointer; transition: all 0.4s;}
.card:hover {border-color: var(--accent); transform: translateY(-6px); box-shadow: 0 15px 40px rgba(0,217,255,0.15);}
.card.underground {border-left: 4px solid var(--danger);}
.card-face {width:50px; height:50px; border-radius:50%; background:var(--warm); display:flex; align-items:center; justify-content:center; font-size:1.5em; margin-bottom:12px;}
.card h3 {font-size: 1.25em; font-weight: 700; margin-bottom: 4px;}
.card.sub {font-size:0.9em; opacity:0.7; margin-bottom:15px;}
.card.metric {display:flex; justify-content:space-between; font-size:0.9em; margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.05);}
.story {font-size:0.85em; font-style:italic; opacity:0.8; margin-top:10px; color:var(--warm);}
.modal {display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); justify-content: center; align-items: center; z-index: 1000;}
.modal-content {background: #01060f; border: 1px solid var(--accent); border-radius: 22px; padding: 35px; width: 95%; max-width: 700px; max-height: 90vh; overflow-y: auto;}
.kpi {display:grid; grid-template-columns: repeat(3,1fr); gap:15px; margin:20px 0;}
.kpi-box {background: rgba(0,217,255,0.05); padding:18px; border-radius:12px; text-align:center; border-bottom: 2px solid var(--accent);}
.kpi-box h4 {font-size:1.8em; color:var(--accent);}
input {width:100%; padding:12px; margin-top:8px; border-radius:10px; border:1px solid rgba(255,255,255,0.2); background:rgba(0,0,0,0.3); color:var(--text);}
.btn {background: linear-gradient(90deg, var(--accent), var(--warm)); border: none; color: #000; padding: 14px 24px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px; font-size: 1em;}
.btn.danger {background:var(--danger); color:#fff;}
</style>
</head>
<body>
<div class="pulse-bg"></div>

<div class="header">
  <h1>TWINZ OS // DEEP CORE</h1>
  <div>2030.04.12 | SURFACE + UNDERGROUND</div>
</div>

<div class="ceo-bar">
  <div class="ceo-num"><h2 id="workers">1,240</h2><p>Workers Tagged</p></div>
  <div class="ceo-num"><h2 id="safe">0</h2><p>Underground Incidents</p></div>
  <div class="ceo-num"><h2 id="air">98%</h2><p>Air Quality OK</p></div>
  <div class="ceo-num"><h2 id="rescue">3min</h2><p>Avg Rescue Time</p></div>
</div>

<div class="grid" id="appGrid"></div>

<div class="modal" id="modal"><div class="modal-content"><h2 id="modalTitle"></h2><div id="modalBody"></div><button class="btn" onclick="closeModal()">CLOSE</button></div></div>

<script>
const modules = [
  // SURFACE MODULES
  {icon:"👷", name:"PEOPLE COMMAND", sub:"Real people. Real jobs.", face:"👷", story:"'This job changed my life' - Lerato", metrics:["512 People","47 Hired","98% Local"], data:["Name","ID","Skill"], zone:"SURFACE"},
  {icon:"📊", name:"PROMISE TRACKER", sub:"SLP Made Visible", face:"📊", story:"'We can finally see where money goes' - Chief", metrics:["R8.4M Invested","320 Jobs","100% Compliant"], data:["Project","Budget"], zone:"SURFACE"},

  // UNDERGROUND MODULES - NOBODY HAS THIS
  {icon:"⛏️", name:"UNDERGROUND TAG & TRACK", sub:"Know where every worker is. Live.", face:"⛏️", story:"'They found my brother in 4 minutes' - Wife", metrics:["1240 Tagged","42 Levels","100% Coverage"], data:["Worker ID","Level","Tag Number"], zone:"UNDERGROUND", critical:true},
  {icon:"🌬️", name:"AIR + GAS COMMAND", sub:"CO, Methane, Dust. Alerts in 2s.", face:"🌬️", story:"'System evacuated us before gas hit' - Miner", metrics:["98% Air OK","0 Gas Alarms","24 Sensors"], data:["Sensor ID","Gas Level","Location"], zone:"UNDERGROUND", critical:true},
  {icon:"🚨", name:"EMERGENCY & REFUGE", sub:"1-Click Evac. Auto Headcount.", face:"🚨", story:"'Refuge bay had water + air' - Survivor", metrics:["18 Refuge Bays","3min Response","100% Tested"], data:["Incident Type","Level","Headcount"], zone:"UNDERGROUND", critical:true},
  {icon:"🔦", name:"EQUIPMENT HEALTH AI", sub:"Predicts drill/conveyor failure", face:"🔦", story:"'AI saved R800K conveyor' - Engineer", metrics:["340 Assets","5 Warnings","R1.2M Saved"], data:["Asset ID","Vibration","Temp"], zone:"BOTH"},
  {icon:"🦺", name:"SAFETY = FAMILY", sub:"PPE + Induction + Permits", face:"🦺", story:"'No entry without PPE scan' - Safety", metrics:["1040 Trained","98% PPE","0 LTI"], data:["Name","Permit","Expiry"], zone:"SURFACE"},
  {icon:"💰", name:"TRANSPARENCY VAULT", sub:"See Every Rand", face:"💰", story:"'Payments in 24hrs' - Supplier", metrics:["R4.8M Paid","67 Paid","0 Complaints"], data:["Payee","Amount"], zone:"SURFACE"},
  {icon:"📢", name:"VOICE OF COMMUNITY", sub:"Heard in 48 Hours", face:"📢", story:"'They fixed our water' - Ward 3", metrics:["3 Open","142 Solved","96% Happy"], data:["Ward","Issue"], zone:"SURFACE"},
  {icon:"🤖", name:"DEEP AI ORACLE", sub:"Predicts rockfall + heat + fatigue", face:"🤖", story:"'AI stopped shift before rockfall' - Overseer", metrics:["12 Predictions","91% Accurate","0 Fatalities"], data:["Ask AI","Level"], zone:"UNDERGROUND", critical:true},
];

const appGrid = document.getElementById('appGrid');
modules.forEach((m, i) => {
  appGrid.innerHTML += `
    <div class="card ${m.zone==='UNDERGROUND'?'underground':''}" onclick="openModule(${i})">
      <div class="card-face">${m.face} ${m.zone==='UNDERGROUND'?'<span class="badge-underground">UG</span>':''}</div>
      <h3>${m.name}</h3>
      <div class="sub">${m.sub}</div>
      ${m.metrics.map(met => `<div class="metric"><span>${met.split(' ').slice(1).join(' ')}</span><b>${met.split(' ')[0]}</b></div>`).join('')}
      <div class="story">“${m.story}”</div>
    </div>
  `;
});

function openModule(i) {
  const m = modules[i];
  let kpiHTML = '<div class="kpi">';
  m.metrics.forEach(k => kpiHTML += `<div class="kpi-box"><h4>${k.split(' ')[0]}</h4><p>${k.split(' ').slice(1).join(' ')}</p></div>`);
  kpiHTML += '</div>';
  let formHTML = m.data.map(f => `<input type="text" placeholder="${f}">`).join('');
  if(m.critical) formHTML += `<button class="btn danger">🚨 SEND EMERGENCY ALERT</button>`;

  document.getElementById('modalTitle').innerText = `${m.icon} ${m.name}`;
  document.getElementById('modalBody').innerHTML = `
    <p style="opacity:0.8;">${m.sub} | Zone: ${m.zone}</p>
    <div class="story">“${m.story}”</div>
    ${kpiHTML}
    <h4 style="margin:15px 0 5px;">LOG ENTRY</h4>
    ${formHTML}
    <button class="btn" onclick="saveData('${m.name}')">SAVE TO DEEP CORE</button>
  `;
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() {document.getElementById('modal').style.display = 'none';}
function saveData(module) {
  alert(`✓ LOGGED TO DEEP CORE\n${module}\nTimestamp + GPS + User ID`);
  closeModal();
}
</script>
</body>
</html>
