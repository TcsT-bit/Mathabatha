<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWINZ OS NEXUS - 2046 Mining Command</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
:root {
  --bg: #00040f;
  --accent: #00ffff;
  --accent2: #ff00ff;
  --gold: #ffd700;
  --glass: rgba(0,255,255,0.04);
  --text: #e0f7ff;
}
* {margin:0; padding:0; box-sizing:border-box; font-family: 'Orbitron', sans-serif;}
body {
  background: #00040f;
  background-image: 
    radial-gradient(circle at 20% 50%, rgba(0,255,255,0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(255,0,255,0.1) 0%, transparent 50%);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
.scanline {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: repeating-linear-gradient(transparent, transparent 2px, rgba(0,255,255,0.03) 3px);
  pointer-events: none; z-index: 999;
}
.header {
  text-align: center; padding: 40px 20px;
  border-bottom: 1px solid var(--accent);
  animation: glow 2s infinite alternate;
}
@keyframes glow {from{box-shadow:0 0 20px var(--accent)} to{box-shadow:0 0 40px var(--accent2)}}
.header h1 {
  font-size: 3.2em; font-weight: 900; letter-spacing: 3px;
  background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: 0 0 30px var(--accent);
}
.ai-bar {
  background: var(--glass); backdrop-filter: blur(30px);
  padding: 15px; margin: 20px auto; max-width: 900px; border-radius: 16px;
  border: 1px solid var(--accent); display:flex; align-items:center; gap:15px;
}
.ai-bar input {
  flex:1; background:transparent; border:none; color:var(--text); font-size:1.1em; outline:none;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 25px;
  padding: 40px;
  max-width: 1500px; margin: 0 auto;
}
.card {
  background: var(--glass);
  backdrop-filter: blur(30px);
  border: 1px solid rgba(0,255,255,0.2);
  border-radius: 24px;
  padding: 30px;
  cursor: pointer;
  transition: all 0.5s;
  position: relative; overflow: hidden;
}
.card::after {
  content:''; position:absolute; inset:0; border-radius:24px; padding:2px;
  background: linear-gradient(45deg, var(--accent), var(--accent2));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; opacity:0; transition:0.5s;
}
.card:hover::after {opacity:1;}
.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 0 50px rgba(0,255,255,0.4);
}
.card .icon {font-size: 3.5em; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--accent));}
.card h3 {font-size: 1.4em; margin-bottom: 10px; font-weight: 700;}
.card .tag {font-size:0.75em; color:var(--gold); letter-spacing:1px;}
.modal {
  display: none; position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.95); backdrop-filter: blur(30px);
  justify-content: center; align-items: center; z-index: 1000;
}
.modal-content {
  background: linear-gradient(135deg, #00040f, #001020);
  border: 2px solid var(--accent);
  border-radius: 28px; padding: 40px; width: 95%; max-width: 800px;
  box-shadow: 0 0 60px rgba(0,255,255,0.3);
}
.kpi {
  display:grid; grid-template-columns: repeat(3,1fr); gap:20px; margin:25px 0;
}
.kpi-box {
  background: rgba(0,255,255,0.05); padding:20px; border-radius:16px; text-align:center;
  border:1px solid var(--accent); position:relative;
}
.kpi-box h4 {font-size:2.2em; color:var(--accent); text-shadow:0 0 10px var(--accent);}
.btn {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border: none; color: #000; padding: 16px 28px; border-radius: 16px;
  font-weight: 900; cursor: pointer; width: 100%; margin-top: 20px;
  font-size: 1.1em; letter-spacing:1px; transition: 0.3s;
}
.btn:hover {transform: scale(1.05); box-shadow: 0 0 30px var(--accent);}
.holo {
  height: 150px; background: radial-gradient(circle, rgba(0,255,255,0.2), transparent);
  border-radius: 20px; margin: 20px 0; display:flex; align-items:center; justify-content:center;
  border: 1px dashed var(--accent); animation: pulse 2s infinite;
}
@keyframes pulse {0%,100%{opacity:0.5} 50%{opacity:1}}
</style>
</head>
<body>
<div class="scanline"></div>

<div class="header">
  <h1>TWINZ OS NEXUS</h1>
  <p>QUANTUM COMMAND CENTER | YEAR 2046 | POWERED BY AI</p>
  <div class="ai-bar">
    <span>🤖</span>
    <input id="aiInput" placeholder="Ask NEXUS AI: 'Show me at-risk trucks' or 'Generate SLP report'">
    <button class="btn" style="width:auto; padding:10px 20px;" onclick="aiTalk()">EXECUTE</button>
  </div>
</div>

<div class="grid" id="appGrid"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="modalTitle"></h2>
    <div id="modalBody"></div>

</div>

  {icon:"🚛", name:"QUANTUM FLEET GRID", tag:"LIVE TELEMETRY", desc:"Satellite GPS + Drone Dispatch. Self-driving truck ready", kpis:["32 Trucks Online","18 Loads Today","0.2s Latency"], features:["Live 3D Map","Fuel Theft AI Detection","Auto Invoice on Delivery"]},
  {icon:"🏪", name:"HOLO MARKETPLACE", tag:"BEE QUANTUM", desc:"NFT Vendor Contracts. Smart Tenders. Auto SLP Credits", kpis:["24 Vendors","R1.2M SLP Spend","86 Orders"], features:["Blockchain PO","AR Product Catalog","Instant Payment Wallet"]},
  {icon:"📊", name:"OMNISCIENT SLP AI", tag:"GOV READY", desc:"Generates DMR reports in 4 seconds. Zero audit risk", kpis:["R8.4M YTD","320 Jobs","GREEN STATUS"], features:["1-Click PDF Export","Fraud Detection","Voice Report to Minister"]},
  {icon:"🦺", name:"BIOMETRIC SAFETY DOME", tag:"ZERO HARM", desc:"QR + Iris Scan. PPE drones. Predict accidents 14 days early", kpis:["1040 Inducted","98% PPE","0 Incidents"], features:["Holographic Training","Medical AI Scan","Emergency Drone Deploy"]},
  {icon:"💰", name:"QUANTUM TREASURY", tag:"BLOCKCHAIN", desc:"Smart contracts. 60-second payouts. Full transparency", kpis:["R4.8M Paid","67 Suppliers","0 Disputes"], features:["Crypto + ZAR Wallet","Fraud Proof Ledger","Tax Auto-File"]},
  {icon:"📢", name:"EMPATHY GRIEVANCE AI", tag:"PEACE ENGINE", desc:"Reads emotion in voice notes. Solves before protest", kpis:["3 Open","142 Solved","96% Happy"], features:["Voice Sentiment AI","Auto Mediation Bot","Chief Notification"]},
  {icon:"🎓", name:"NEURAL ACADEMY", tag:"SETA 5.0", desc:"VR Welding. AI Tutor. Job guarantee contract", kpis:["240 Students","89 Placed","12 Courses"], features:["VR Simulator","AI Career Path","Digital Certificate NFT"]},

  {icon:"🏦", name:"CENTURY TRUST VAULT", tag:"2046 READY", desc:"AI manages closure fund. Community votes on blockchain", kpis:["R12M Vault","9 Projects","3400 Votes"], features:["AI Investment Advisor","Generational Payout","Holographic Townhall"]},
  {icon:"🗺️", name:"ANCESTRAL HOLOGRID", tag:"HERITAGE AI", desc:"3D map of sacred sites. Auto-consultation scheduler", kpis:["22 Sites","18 Meetings","100% Peace"], features:["AR Grave Protection","Voice of Elders Log","Land Dispute AI"]},

  {icon:"💳", name:"QUANTUM WALLET", tag:"CO-OP 2046", desc:"Stokvel on blockchain. Micro-loans in 10 seconds", kpis:["640 Members","R3.2M Saved","112 Loans"], features:["Face Pay","Credit Score AI","Wealth Generator"]},
  {icon:"🤖", name:"NEXUS ORACLE", tag:"PREDICTIVE AI", desc:"Predicts mine problems 90 days ahead", kpis:["5 Alerts","94% Accuracy","R1.8M Saved"], features:["Risk Simulation","What-If Scenarios","CEO Briefing Voice"]},

const appGrid = document.getElementById('appGrid');
modules.forEach((m, i) => {
  appGrid.innerHTML += `
    <div class="card" onclick="openModule(${i})">
      <div class="icon">${m.icon}</div>
      <div class="tag">${m.tag}</div>
      <h3>${m.name}</h3>
      <p>${m.desc}</p>
    </div>
  `;
});

function openModule(i) {
  const m = modules[i];
  let kpiHTML = '<div class="kpi">';
  m.kpis.forEach(k => kpiHTML += `<div class="kpi-box"><h4>${k.split(':')[1]||k}</h4><p>${k.split(':')[0]}</p></div>`);
  kpiHTML += '</div>';
  
  let featureHTML = '<h4>2046 FEATURES:</h4><ul style="margin:15px 0; padding-left:20px;">';
  m.features.forEach(f => featureHTML += `<li>⚡ ${f}</li>`);
  featureHTML += '</ul>';

  document.getElementById('modalTitle').innerHTML = `${m.icon} ${m.name}`;
  document.getElementById('modalBody').innerHTML = `
    <div class="holo">[HOLOGRAPHIC DASHBOARD LOADING...]</div>
    <p>${m.desc}</p>
    ${kpiHTML}
    ${featureHTML}
    <button class="btn" onclick="saveData('${m.name}')">ACTIVATE QUANTUM PROTOCOL</button>
  `;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {document.getElementById('modal').style.display = 'none';}

function saveData(module) {
  let data = JSON.parse(localStorage.getItem('twinzNexus')) || [];
  data.push({module, time: new Date().toISOString(), quantum: true});
  localStorage.setItem('twinzNexus', JSON.stringify(data));
  alert(`QUANTUM ENTRY LOGGED\n${module}\nTimestamp: ${new Date().toLocaleString()}\nStatus: SYNCHRONIZED WITH NEXUS`);
  closeModal();
}

function aiTalk() {
  const q = document.getElementById('aiInput').value;
  if(q) alert(`NEXUS AI: "Processing: ${q}"\n\nGenerating report... Done. Check SLP Dashboard.`);
}
</script>
</body>
</html>
