<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWINZ OS DIAMOND - Mining Command Center</title>
<style>
:root {
  --bg1: #050812;
  --bg2: #0a1020;
  --accent: #00f5ff;
  --accent2: #a855f7;
  --gold: #ffd700;
  --glass: rgba(255,255,255,0.05);
  --text: #f0f4ff;
}
* {margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;}
body {
  background: radial-gradient(circle at 20% 50%, #0a1020 0%, #050812 100%);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
.glow {box-shadow: 0 0 30px rgba(0,245,255,0.15);}
.header {
  text-align: center; padding: 30px 20px;
  background: linear-gradient(180deg, rgba(0,245,255,0.1), transparent);
  border-bottom: 1px solid rgba(0,245,255,0.2);
  animation: fadeIn 1s ease;
}
.header h1 {
  font-size: 2.8em; font-weight: 900; letter-spacing: -1px;
  background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.stats {
  display:flex; justify-content:center; gap:20px; margin-top:15px; flex-wrap:wrap;
}
.stat {
  background: var(--glass); backdrop-filter: blur(20px);
  padding: 10px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  padding: 30px;
  max-width: 1400px; margin: 0 auto;
}
.card {
  background: var(--glass);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 22px;
  padding: 25px;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative; overflow: hidden;
}
.card::before {
  content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(0,245,255,0.2), transparent);
  transition: 0.5s;
}
.card:hover::before {left:100%;}
.card:hover {
  transform: translateY(-8px) scale(1.02);
  border-color: var(--accent);
  box-shadow: 0 20px 50px rgba(0,245,255,0.25);
}
.card.icon {font-size: 3em; margin-bottom: 15px;}
.card h3 {font-size: 1.3em; margin-bottom: 8px; font-weight: 700;}
.card p {opacity: 0.7; font-size: 0.9em; line-height: 1.5;}
.modal {
  display: none; position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
  justify-content: center; align-items: center; z-index: 1000;
  animation: fadeIn 0.3s ease;
}
.modal-content {
  background: linear-gradient(135deg, #0a1020, #050812);
  border: 2px solid var(--accent);
  border-radius: 24px; padding: 30px; width: 95%; max-width: 700px;
  max-height: 90vh; overflow-y: auto;
  animation: slideUp 0.4s ease;
}
.kpi {
  display:grid; grid-template-columns: repeat(3,1fr); gap:15px; margin:20px 0;
}
.kpi-box {
  background: var(--glass); padding:15px; border-radius:14px; text-align:center;
  border:1px solid rgba(255,255,255,0.1);
}
.kpi-box h4 {font-size:1.8em; color:var(--accent);}
.btn {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border: none; color: #000; padding: 14px 24px; border-radius: 14px;
  font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px;
  font-size: 1em; transition: 0.3s;
}
.btn:hover {transform: scale(1.02); box-shadow: 0 0 20px var(--accent);}
input, textarea, select {
  width: 100%; padding: 14px; margin-top: 10px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: var(--text);
  font-size: 1em;
}
@keyframes fadeIn {from{opacity:0} to{opacity:1}}
@keyframes slideUp {from{transform:translateY(50px); opacity:0} to{transform:translateY(0); opacity:1}}
.badge {background: var(--gold); color:#000; padding:4px 10px; border-radius:8px; font-size:0.75em; font-weight:800;}
</style>
</head>
<body>

<div class="header">
  <h1>TWINZ OS DIAMOND</h1>
  <p>The Command Center for Mining Communities | v2.0</p>
  <div class="stats">
    <div class="stat">💼 <b id="statJobs">0</b> Active Jobs</div>
    <div class="stat">🚛 <b id="statTrucks">0</b> Fleet Online</div>
    <div class="stat">💰 <b id="statPaid">R0</b> Paid to Community</div>
  </div>
</div>

<div class="grid" id="appGrid"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="modalTitle"></h2>
    <div id="modalBody"></div>
    <button class="btn" onclick="closeModal()">Close Module</button>
  </div>
</div>

<script>
// DIAMOND DATA
const modules = [
  {icon:"👷", name:"Labor Pool Command", desc:"AI Matchmaking. 500+ Verified. Compliance Ready", kpis:["Active CVs: 512","Hired This Month: 47","SLP Score: 98%"], form:["Full Name","ID Number","Skill + Years Exp","WhatsApp"]},
  {icon:"🚛", name:"Fleet Command Center", desc:"Live GPS. Smart Dispatch. Payment Proof", kpis:["Trucks Online: 32","Loads Today: 18","Avg Payout: R2,400"], form:["Company Name","Truck Type","Rate Per Km","Driver License"]},
  {icon:"🏪", name:"Supplier Marketplace", desc:"BEE Verified. 24hr Tender. Auto Invoicing", kpis:["Vendors: 24","Orders This Week: 86","SLP Spend: R1.2M"], form:["Business Name","What You Supply","BEE Level","Contact"]},
  {icon:"📊", name:"SLP Compliance AI", desc:"Auto DMR Reports. 1-Click Audit Pack", kpis:["Jobs Created: 320","Spend YTD: R8.4M","Audit Status: Green"], form:["Report Type","Quarter","Notes"]},
  {icon:"🦺", name:"Safety & Induction HQ", desc:"QR Access. Expiry Alerts. Zero Incidents", kpis:["Inducted: 1040","Valid PPE: 98%","Incidents: 0"], form:["Employee Name","Induction Date","Medical Expiry"]},
  {icon:"💰", name:"Treasury & Payments", desc:"Blockchain Transparency. 24hr Payouts", kpis:["Paid This Month: R4.8M","Suppliers: 67","Disputes: 0"], form:["Payee","Amount","Service Rendered"]},
  {icon:"📢", name:"Community Grievance AI", desc:"48hr SLA. Escalation Matrix. Resolution Proof", kpis:["Open Cases: 3","Resolved: 142","Satisfaction: 96%"], form:["Ward","Issue","Urgency Level"]},
  {icon:"🎓", name:"Skills Academy Pro", desc:"SETA Accredited. Job Placement Guarantee", kpis:["Students: 240","Placed: 89","Courses: 12"], form:["Course","Name","ID","Phone"]},
  {icon:"🌱", name:"Business Incubator", desc:"Grant Writing. Market Access. Funding", kpis:["Businesses: 38","Grants Won: R2.1M","Contracts: 54"], form:["Business Idea","Funding Needed","Sector"]},
  {icon:"🏥", name:"Health & Wellness Hub", desc:"Telemedicine. Clinic Booking. Campaigns", kpis:["Patients Seen: 1200","Campaigns: 8","Health Score: A"], form:["Service Needed","Name","Phone","Date"]},
  {icon:"⚽", name:"Youth & Culture Arena", desc:"Sponsorships. Tournaments. Bursaries", kpis:["Teams: 16","Bursaries: R500K","Events: 4"], form:["Event Type","Team/Name","Budget Needed"]},
  {icon:"🏦", name:"Legacy Trust Fund", desc:"Mine Closure Planning. Community Voting", kpis:["Fund Balance: R12M","Projects: 9","Votes Cast: 3400"], form:["Project Proposal","Estimated Cost","Ward"]},
  {icon:"🗺️", name:"Ancestor & Heritage GIS", desc:"Sacred Site Protection. Consultation Log", kpis:["Sites Mapped: 22","Meetings: 18","Agreements: 100%"], form:["Location","Issue","GPS Coordinates"]},
  {icon:"🌳", name:"ESG Environmental Command", desc:"Carbon, Water, Rehab Tracking", kpis:["Trees: 8,400","Water Quality: Pass","ESG Score: AA"], form:["Report Type","Photo Upload","Location"]},
  {icon:"💳", name:"Legacy Wallet & Co-op", desc:"Digital Stokvel. Micro-Loans. Payments", kpis:["Members: 640","Saved: R3.2M","Loans: 112"], form:["Wallet Action","Amount","Member ID"]},
  {icon:"🤖", name:"AI Foreman Oracle", desc:"Predicts Risks. Suggests Actions", kpis:["Alerts: 5","Accuracy: 94%","Savings: R1.8M"], form:["Ask AI Anything..."]},
  {icon:"📦", name:"Clone & Deploy Kit", desc:"Launch TWINZ OS for Any Mine in 60s", kpis:["Templates: 1","Deployments: 0","License Value: R250K"], form:["New Mine Name","Province","Contact Person"]}
];

const appGrid = document.getElementById('appGrid');
modules.forEach((m, i) => {
  appGrid.innerHTML += `
    <div class="card glow" onclick="openModule(${i})">
      <div class="icon">${m.icon}</div>
      <h3>${m.name}</h3>
      <p>${m.desc}</p>
    </div>
  `;
});

function openModule(i) {
  const m = modules[i];
  let kpiHTML = '<div class="kpi">';
  m.kpis.forEach(k => kpiHTML += `<div class="kpi-box"><h4>${k.split(':')[1]||''}</h4><p>${k.split(':')[0]}</p></div>`);
  kpiHTML += '</div>';

  let formHTML = '';
  m.form.forEach(f => {
    if(f.includes("Level") || f.includes("Urgency") || f.includes("Type")) {
      formHTML += `<select><option>${f}</option></select>`;
    } else {
      formHTML += `<input type="text" placeholder="${f}">`;
    }
  });

  document.getElementById('modalTitle').innerHTML = `${m.icon} ${m.name} <span class="badge">DIAMOND</span>`;
  document.getElementById('modalBody').innerHTML = `
    <p style="opacity:0.8; margin-bottom:15px;">${m.desc}</p>
    ${kpiHTML}
    <h4 style="margin:15px 0 5px;">Submit Entry</h4>
    ${formHTML}
    <button class="btn" onclick="saveData('${m.name}')">✨ SUBMIT TO TWINZ BLOCKCHAIN</button>
    <p style="font-size:0.8em; margin-top:10px; opacity:0.6">Encrypted. Timestamped. Audit Ready.</p>
  `;
  document.getElementById('modal').style.display = 'flex';
  updateStats();
}

function closeModal() {document.getElementById('modal').style.display = 'none';}

function saveData(module) {
  let data = JSON.parse(localStorage.getItem('twinzDiamond')) || [];
  data.push({module, time: new Date().toISOString(), id: Math.random().toString(36).substr(2,9)});
  localStorage.setItem('twinzDiamond', JSON.stringify(data));
  alert(`✅ DIAMOND ENTRY SAVED\nModule: ${module}\nTotal Records: ${data.length}\nSync pending...`);
  closeModal();
  updateStats();
}

function updateStats() {
  const data = JSON.parse(localStorage.getItem('twinzDiamond')) || [];
  document.getElementById('statJobs').innerText = data.filter(d=>d.module.includes('Labor')).length + 512;
  document.getElementById('statTrucks').innerText = 32;
  document.getElementById('statPaid').innerText = 'R' + (4800000 + data.length * 1000).toLocaleString();
}
updateStats();
</script>

</body>
</html>
